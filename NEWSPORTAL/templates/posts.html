{% extends 'flatpages/default.html' %} 

{% load custom_filters %}
 
{% block title %}
POSTS
{% endblock title %}
 

{% block content %}

{% for post in posts %}
    <h1>{{ post.title|censor }}</h1>
    {{ post.create_time }} 
    <br>
    {{ post.text|truncatechars:20|censor}}
<hr>
{% endfor %}
{% endblock content %}
